<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Image Upload</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

img{
    width:100%;
    margin-top:15px;
    display:none;
    border-radius:10px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    word-break:break-all;
}
</style>

</head>
<body>

<div class="container">

<h2>Upload Image to GitHub</h2>

<input type="file" id="image">

<img id="preview">

<button onclick="uploadImage()">Upload</button>

<div id="result"></div>

</div>

<script>

const TOKEN="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";

const OWNER="mylandingpage-max";

const REPO="Sweetie-store";

const FOLDER="images";

let selectedFile;

document.getElementById("image").addEventListener("change",function(e){

selectedFile=e.target.files[0];

const reader=new FileReader();

reader.onload=function(){

document.getElementById("preview").src=reader.result;
document.getElementById("preview").style.display="block";

}

reader.readAsDataURL(selectedFile);

});


async function uploadImage(){

if(!selectedFile){

alert("Choose image first.");

return;

}

const reader=new FileReader();

reader.onload=async function(){

const base64=reader.result.split(",")[1];

const filename=Date.now()+"_"+selectedFile.name;

const url=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}/${filename}`;

const response=await fetch(url,{

method:"PUT",

headers:{

Authorization:`Bearer ${TOKEN}`,

Accept:"application/vnd.github+json"

},

body:JSON.stringify({

message:"Upload image",

content:base64

})

});

const data=await response.json();

if(data.content){

const imageUrl=`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FOLDER}/${filename}`;

document.getElementById("result").innerHTML=`
<b>Success!</b><br><br>

<a href="${imageUrl}" target="_blank">

${imageUrl}

</a>

`;

}else{

document.getElementById("result").innerHTML=
JSON.stringify(data,null,2);

}

}

reader.readAsDataURL(selectedFile);

}

</script>

</body>
</html>
